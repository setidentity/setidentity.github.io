<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d0d;
            color: #e8e8e8;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #888;
            font-size: 1.1rem;
            font-weight: 400;
        }

        .main-controls {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #333;
        }

        .input-row {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .room-input {
            flex: 1;
            padding: 0.75rem 1rem;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .room-input:focus {
            border-color: #666;
            background: #333;
        }

        .room-input::placeholder {
            color: #777;
        }

        .btn {
            padding: 0.75rem 1.25rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn-primary {
            background: #4a9eff;
            color: white;
        }

        .btn-primary:hover {
            background: #3d8ce6;
        }

        .btn-secondary {
            background: #555;
            color: white;
        }

        .btn-secondary:hover {
            background: #666;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .session-controls {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .session-controls .btn {
            font-size: 0.9rem;
            padding: 0.6rem 1rem;
        }

        .status-bar {
            text-align: center;
            padding: 0.75rem;
            background: #252525;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 0.5rem;
        }

        .status-online { background: #27ae60; }
        .status-connecting { background: #f39c12; }
        .status-offline { background: #e74c3c; }

        .rooms-section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 1rem;
            color: #fff;
        }

        .rooms-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .room-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .room-card:hover {
            background: #222;
            border-color: #555;
        }

        .room-name {
            font-weight: 500;
            color: #fff;
            margin-bottom: 0.25rem;
        }

        .room-count {
            color: #888;
            font-size: 0.9rem;
        }

        .connections-section {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 1.5rem;
        }

        .audio-player {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .audio-player:last-child {
            margin-bottom: 0;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .user-id {
            font-weight: 500;
            color: #fff;
        }

        .audio-controls audio {
            width: 100%;
            margin-top: 0.5rem;
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 2rem;
        }

        .message {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .message-success {
            background: rgba(39, 174, 96, 0.1);
            border: 1px solid rgba(39, 174, 96, 0.3);
            color: #27ae60;
        }

        .message-error {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #333;
            border-radius: 50%;
            border-top-color: #4a9eff;
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 640px) {
            .input-row {
                flex-direction: column;
            }
            
            .session-controls {
                flex-direction: column;
                align-items: center;
            }
            
            .title {
                font-size: 2rem;
            }
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">Voice Chat</h1>
            <p class="subtitle">Simple voice rooms for everyone</p>
        </div>

        <div class="main-controls">
            <div class="input-row">
                <input 
                    type="text" 
                    id="roomCode" 
                    class="room-input" 
                    placeholder="Enter room code..."
                    maxlength="8"
                />
                <button class="btn btn-primary" onclick="joinRoom()">Join</button>
                <button class="btn btn-secondary" onclick="createRoom()">New Room</button>
            </div>
            
            <div class="session-controls hidden" id="sessionControls">
                <button class="btn btn-secondary" id="muteBtn" onclick="toggleMute()">Mute</button>
                <button class="btn btn-danger" onclick="leaveRoom()">Leave</button>
            </div>
        </div>

        <div class="status-bar hidden" id="statusBar">
            <span class="status-dot status-offline" id="statusDot"></span>
            <span id="statusText">Disconnected</span>
        </div>

        <div id="messageContainer"></div>

        <div class="rooms-section">
            <h2 class="section-title">Active Rooms</h2>
            <div class="rooms-list" id="roomsList">
                <div class="empty-state">
                    <div class="loading"></div>
                    Looking for rooms...
                </div>
            </div>
        </div>

        <div class="connections-section">
            <h2 class="section-title">Voice Connections</h2>
            <div id="audioContainer">
                <div class="empty-state">
                    No active connections
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simple voice chat app
        const roomsURL = 'https://api.jsonbin.io/v3/b/665f96d9acd3cb34a845123b'; // Replace with your API
        let peer, localStream;
        let currentRoom = null;
        let isMuted = false;
        let connections = new Map();

        // Show a message to the user
        function showMessage(text, type = 'success') {
            const container = document.getElementById('messageContainer');
            const message = document.createElement('div');
            message.className = `message message-${type}`;
            message.textContent = text;
            container.appendChild(message);
            
            setTimeout(() => message.remove(), 4000);
        }

        // Update the connection status
        function updateStatus(status, text) {
            const statusBar = document.getElementById('statusBar');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            statusBar.classList.remove('hidden');
            statusDot.className = `status-dot status-${status}`;
            statusText.textContent = text;
        }

        // Load and display available rooms
        async function loadRooms() {
            try {
                const response = await fetch(roomsURL, {
                    headers: { 'X-Master-Key': '$2b$10$1234567890123456789012' }
                });
                const data = await response.json();
                const rooms = data.record || {};
                
                const roomsList = document.getElementById('roomsList');
                roomsList.innerHTML = '';
                
                if (Object.keys(rooms).length === 0) {
                    roomsList.innerHTML = '<div class="empty-state">No rooms available. Create one to get started!</div>';
                    return;
                }
                
                Object.entries(rooms).forEach(([code, peers]) => {
                    const card = document.createElement('div');
                    card.className = 'room-card';
                    card.innerHTML = `
                        <div class="room-name">${code}</div>
                        <div class="room-count">${peers.length} connected</div>
                    `;
                    card.onclick = () => joinRoom(code);
                    roomsList.appendChild(card);
                });
                
            } catch (error) {
                showMessage('Could not load rooms', 'error');
            }
        }

        // Set up peer connection
        function setupPeer(callback) {
            peer = new Peer();
            
            peer.on('open', id => {
                updateStatus('online', 'Connected');
                callback(id);
            });
            
            peer.on('call', call => {
                call.answer(localStream);
                call.on('stream', stream => {
                    addAudioConnection(stream, call.peer);
                });
            });
            
            peer.on('error', error => {
                showMessage('Connection failed', 'error');
                updateStatus('offline', 'Connection failed');
            });
        }

        // Add an audio connection
        function addAudioConnection(stream, peerId) {
            const container = document.getElementById('audioContainer');
            
            // Clear empty state
            const emptyState = container.querySelector('.empty-state');
            if (emptyState) emptyState.remove();
            
            const playerDiv = document.createElement('div');
            playerDiv.className = 'audio-player';
            playerDiv.id = `player-${peerId}`;
            
            const audio = document.createElement('audio');
            audio.srcObject = stream;
            audio.autoplay = true;
            audio.controls = true;
            
            playerDiv.innerHTML = `
                <div class="player-header">
                    <div class="user-id">User ${peerId.substring(0, 6)}</div>
                </div>
                <div class="audio-controls"></div>
            `;
            
            playerDiv.querySelector('.audio-controls').appendChild(audio);
            container.appendChild(playerDiv);
            
            connections.set(peerId, playerDiv);
        }

        // Create a new room
        function createRoom() {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            currentRoom = code;
            
            updateStatus('connecting', 'Creating room...');
            
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    localStream = stream;
                    setupPeer(id => {
                        updateRoomData(code, [id]);
                        showMessage(`Room ${code} created`);
                        showSessionControls();
                        document.getElementById('roomCode').value = code;
                    });
                })
                .catch(error => {
                    showMessage('Microphone access needed', 'error');
                    updateStatus('offline', 'Microphone access denied');
                });
        }

        // Join an existing room
        function joinRoom(roomCode) {
            const code = roomCode || document.getElementById('roomCode').value.trim().toUpperCase();
            
            if (!code) {
                showMessage('Please enter a room code', 'error');
                return;
            }
            
            currentRoom = code;
            updateStatus('connecting', 'Joining room...');
            
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    localStream = stream;
                    setupPeer(id => {
                        // Get existing room data and add ourselves
                        fetch(roomsURL, {
                            headers: { 'X-Master-Key': '$2b$10$1234567890123456789012' }
                        })
                        .then(res => res.json())
                        .then(data => {
                            const rooms = data.record || {};
                            const peers = rooms[code] || [];
                            
                            peers.push(id);
                            updateRoomData(code, peers);
                            
                            // Connect to existing peers
                            peers.forEach(peerId => {
                                if (peerId !== id) {
                                    const call = peer.call(peerId, localStream);
                                    if (call) {
                                        call.on('stream', stream => {
                                            addAudioConnection(stream, peerId);
                                        });
                                    }
                                }
                            });
                            
                            showMessage(`Joined room ${code}`);
                            showSessionControls();
                        });
                    });
                })
                .catch(error => {
                    showMessage('Microphone access needed', 'error');
                    updateStatus('offline', 'Microphone access denied');
                });
        }

        // Update room data on server
        function updateRoomData(code, peers) {
            const roomData = { [code]: peers };
            
            fetch(roomsURL, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': '$2b$10$1234567890123456789012'
                },
                body: JSON.stringify(roomData)
            })
            .then(() => loadRooms())
            .catch(error => console.error('Room update failed:', error));
        }

        // Show session controls
        function showSessionControls() {
            document.getElementById('sessionControls').classList.remove('hidden');
        }

        // Toggle mute
        function toggleMute() {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    isMuted = !audioTrack.enabled;
                    
                    const muteBtn = document.getElementById('muteBtn');
                    muteBtn.textContent = isMuted ? 'Unmute' : 'Mute';
                    muteBtn.className = isMuted ? 'btn btn-primary' : 'btn btn-secondary';
                    
                    showMessage(isMuted ? 'Muted' : 'Unmuted');
                }
            }
        }

        // Leave current room
        function leaveRoom() {
            if (peer) peer.destroy();
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            
            // Clear connections
            document.getElementById('audioContainer').innerHTML = '<div class="empty-state">No active connections</div>';
            connections.clear();
            
            // Hide controls
            document.getElementById('sessionControls').classList.add('hidden');
            document.getElementById('statusBar').classList.add('hidden');
            
            // Reset state
            currentRoom = null;
            isMuted = false;
            
            showMessage('Left room');
            loadRooms();
        }

        // Initialize the app
        function init() {
            loadRooms();
            setInterval(loadRooms, 5000); // Refresh rooms every 8 seconds
            
            // Enter key support
            document.getElementById('roomCode').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') joinRoom();
            });
        }

        // Start everything
        init();
    </script>
</body>
</html>
